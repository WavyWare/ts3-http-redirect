<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Automatic redirection to TeamSpeak 3 server">
    <title>TeamSpeak Redirect</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎧</text></svg>">
</head>
<body>
    <div class="container">
        <div class="logo">🎧</div>
        <h1>TeamSpeak Redirect</h1>
        <div class="status" id="status">Checking settings...</div>
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
        <p id="fallback-text" style="display: none;">
            If you weren't automatically redirected:
        </p>
        <div class="button-container">
            <a href="#" id="manual-link" class="ts-button" style="display: none;">
                Join TeamSpeak Server
            </a>
        </div>
        <div class="info" id="info" style="display: none;">
            <details>
                <summary>Connection Information</summary>
                <div id="connection-details"></div>
            </details>
        </div>
        <div class="troubleshooting" style="display: none;" id="troubleshooting">
            <h3>Troubleshooting</h3>
            <ul>
                <li>Ensure TeamSpeak 3 client is installed</li>
                <li>Check if your browser supports the ts3server:// protocol</li>
                <li>Check browser security settings</li>
            </ul>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script src="redirect.js"></script>
</body>
</html>
